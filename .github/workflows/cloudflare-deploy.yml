name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat <<EOF > .env.production
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_LEMON_SQUEEZY_PRO_VARIANT_ID=${{ secrets.NEXT_PUBLIC_LEMON_SQUEEZY_PRO_VARIANT_ID }}
          NEXT_PUBLIC_LEMON_SQUEEZY_MAX_VARIANT_ID=${{ secrets.NEXT_PUBLIC_LEMON_SQUEEZY_MAX_VARIANT_ID }}
          NEXT_PUBLIC_LEMON_SQUEEZY_TOKEN_STARTER_VARIANT_ID=${{ secrets.NEXT_PUBLIC_LEMON_SQUEEZY_TOKEN_STARTER_VARIANT_ID }}
          NEXT_PUBLIC_LEMON_SQUEEZY_TOKEN_POWER_VARIANT_ID=${{ secrets.NEXT_PUBLIC_LEMON_SQUEEZY_TOKEN_POWER_VARIANT_ID }}
          NEXT_PUBLIC_LEMON_SQUEEZY_TOKEN_ENTERPRISE_VARIANT_ID=${{ secrets.NEXT_PUBLIC_LEMON_SQUEEZY_TOKEN_ENTERPRISE_VARIANT_ID }}
          EOF

      - name: Build for Cloudflare Pages
        run: npm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=flowbooks
